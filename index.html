<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的项目作品集</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        .member, .persona { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        img { max-width: 150px; border-radius: 50%; }
    </style>
</head>
<body>

    <h1>欢迎来到我们的项目主页 (Project Portfolio)</h1>

    <h2>👩‍💻 小组成员介绍 (Group Members)</h2>
    <div class="member">
        <h3>Name: [填入姓名]</h3>
        <p><strong>Student ID:</strong> [填入学号]</p>
        <img src="https://via.placeholder.com/150" alt="Profile picture">
        <p><strong>Brief introduction:</strong> [在这里写一段简短的自我介绍...]</p>
    </div>

    <h2>👥 项目用户画像 (Project Personas)</h2>
    <div class="persona">
        <h3>Persona 1: [用户画像名称，例如：忙碌的大学生]</h3>
        <p>[这里用来填写 AI 帮你生成的第一个用户画像内容...]</p>
    </div>

    <div class="persona">
        <h3>Persona 2: [用户画像名称]</h3>
        <p>[这里用来填写 AI 帮你生成的第二个用户画像内容...]</p>
    </div>

</body>
</html>
